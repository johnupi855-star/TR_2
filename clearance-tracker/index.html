<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clearance Tracker — UPI</title>
<style>
  /* ── original styles (unchanged) ── */
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f4f6f9;color:#222;font-size:13px}
  .header{background:#1a3a5c;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px}
  .header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
  .header span{font-size:12px;opacity:.7;margin-left:auto}
  .wrap{padding:16px 20px}
  .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
  .card{background:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .card-label{font-size:11px;color:#888;margin-bottom:4px}
  .card-val{font-size:20px;font-weight:600;color:#1a3a5c}
  .card-sub{font-size:11px;color:#aaa;margin-top:2px}
  .mode-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .mode-badge{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:600}
  .mode-view{background:#d4edda;color:#155724}
  .mode-edit{background:#fff3cd;color:#856404}
  .hint{font-size:11px;color:#888}
  .toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
  .toolbar select,.toolbar input{font-size:12px;padding:5px 9px;border-radius:6px;border:1px solid #d0d7e2;background:#fff;color:#222;height:32px}
  .toolbar input{flex:1;min-width:150px}
  .btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #d0d7e2;background:#fff;color:#222;cursor:pointer;height:32px;display:inline-flex;align-items:center;gap:5px;font-weight:500}
  .btn:hover{background:#f0f4fa}
  .btn-edit{border-color:#1a3a5c;color:#1a3a5c}
  .btn-add{border-color:#1a7a4a;color:#1a7a4a}
  .tbl-wrap{overflow-x:auto;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  table{width:100%;border-collapse:collapse;background:#fff;font-size:12px}
  th{background:#1a3a5c;color:#e8edf5;font-weight:500;padding:9px 8px;text-align:left;white-space:nowrap;font-size:11px}
  th:first-child{border-radius:8px 0 0 0}
  th:last-child{border-radius:0 8px 0 0}
  td{padding:7px 8px;border-bottom:1px solid #eef1f6;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f8fafd}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap}
  .bank-QNB{background:#dbeafe;color:#1e40af}
  .bank-NBE{background:#dcfce7;color:#166534}
  .bank-ATJ{background:#fef9c3;color:#854d0e}
  .s-W{background:#dbeafe;color:#1e40af}
  .s-F{background:#fef3c7;color:#92400e}
  .s-H{background:#ffe4e6;color:#9f1239}
  .s-C{background:#d1fae5;color:#065f46}
  .s-WO{background:#e0e7ff;color:#3730a3}
  .s-B{background:#fef9c3;color:#854d0e}
  .s-O{background:#dcfce7;color:#166534}
  .s-SW{background:#fef9c3;color:#854d0e}
  .s-SB{background:#f3e8ff;color:#6b21a8}
  .s-SO{background:#fee2e2;color:#991b1b}
  .s-N{background:#f1f5f9;color:#475569}
  .c-RELAN{background:#e0f2fe;color:#0369a1}
  td:nth-child(12){width:65px;min-width:65px;max-width:65px}
  .c-MAHABA{background:#fce7f3;color:#9d174d}
  .c-BADRY{background:#f0fdf4;color:#166534}
  .days-ok{color:#16a34a;font-weight:600}
  .days-warn{color:#d97706;font-weight:600}
  .days-danger{color:#dc2626;font-weight:600}
  .days-neg{color:#94a3b8}
  .edit-cell input,.edit-cell select,.edit-cell textarea{width:100%;font-size:11px;padding:2px 3px;border-radius:4px;border:1px solid #c7d2e0;background:#fffef8;color:#222;font-family:inherit}
  .edit-cell textarea{height:60px;resize:vertical;font-size:12px;width:100%;box-sizing:border-box}
  .icon-btn{border:none;background:transparent;cursor:pointer;color:#94a3b8;font-size:15px;padding:3px 5px;border-radius:4px}
  .icon-btn:hover{background:#f1f5f9;color:#334155}
  .icon-btn.del:hover{color:#dc2626;background:#fee2e2}
  .icon-btn.save:hover{color:#166534;background:#dcfce7}
  .empty{text-align:center;padding:2rem;color:#94a3b8}
  .sub-text{font-size:10px;color:#94a3b8;margin-top:1px}
  .footer{text-align:center;padding:14px;color:#aaa;font-size:11px}
  @media print{.toolbar,.mode-bar,.btn{display:none!important}}

  /* F Status Modal */
  #fModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center}
  #fModal.active{display:flex}
  #fModal .box{background:#fff;border-radius:12px;padding:28px 32px;max-width:360px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
  #fModal .box h3{font-size:22px;margin-bottom:8px}
  #fModal .box p{font-size:13px;color:#555;margin-bottom:20px}
  #fModal .btns{display:flex;gap:10px;justify-content:center}
  #fModal .btns button{padding:9px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
  #fModal .yes{background:#dc2626;color:#fff}
  #fModal .no{background:#e5e7eb;color:#374151}

  /* ── additions only: spinner, toast, saving indicator ── */
  #spinnerOverlay{
    display:none;position:fixed;inset:0;background:rgba(255,255,255,.55);
    z-index:9000;align-items:center;justify-content:center
  }
  #spinnerOverlay.active{display:flex}
  .spinner{width:38px;height:38px;border:4px solid #d0d7e2;
    border-top-color:#1a3a5c;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #toastContainer{
    position:fixed;bottom:24px;right:24px;z-index:9100;
    display:flex;flex-direction:column;gap:8px;pointer-events:none
  }
  .toast{
    padding:9px 16px;border-radius:7px;font-size:12px;font-weight:500;
    color:#fff;opacity:0;transform:translateY(8px);
    transition:opacity .25s,transform .25s;pointer-events:none;
    max-width:320px;box-shadow:0 2px 8px rgba(0,0,0,.18)
  }
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.success{background:#166534}
  .toast.error{background:#991b1b}
  .toast.info{background:#1a3a5c}

  #savingDot{
    display:none;width:8px;height:8px;border-radius:50%;
    background:#d97706;margin-left:6px;animation:pulse 1s infinite
  }
  #savingDot.active{display:inline-block}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .btn[disabled]{opacity:.5;cursor:not-allowed}

  /* Color Picker */
  .cp-btn{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:10px;font-weight:500;white-space:nowrap;font-family:inherit}
  .cp-btn:hover{background:#f8fafc}
  .cp-dot-sm{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0;display:inline-block}
  .cp-lbl{max-width:70px;overflow:hidden;text-overflow:ellipsis}
  /* Shared menu */
  #sharedCpMenu{display:none;position:fixed;z-index:99999;background:#fff;border-radius:12px;padding:7px;min-width:190px;box-shadow:0 12px 36px rgba(0,0,0,.18);border:1px solid #e5e7eb}
  .scp-opt{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;margin-bottom:2px;border:2px solid transparent;color:#1e293b;transition:border-color .1s}
  .scp-opt:last-child{margin-bottom:0}
  .scp-opt:hover{border-color:rgba(0,0,0,.18)}
  .scp-opt.scp-sel{border-color:#1a3a5c}
  .scp-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0;display:inline-block}

  /* Row Colors *//* Row Colors */
  .row-color-1 td { background:#f1f5f9 !important }
  .row-color-2 td { background:#eff6ff !important }
  .row-color-3 td { background:#fffbeb !important }
  .row-color-4 td { background:#fff7ed !important }
  .row-color-5 td { background:#f5f3ff !important }
  .row-color-6 td { background:#ecfdf5 !important }
  .row-color-7 td { background:#f0fdfa !important }
  .row-color-8 td { background:#f0fdf4 !important }
  .row-color-9 td { background:#fef2f2 !important }
  tr[class*="row-color"]:hover td { filter:brightness(0.97) }

  /* Active edit row highlight */
  tr.row-active-edit td { background:#fffbeb !important; box-shadow:inset 0 0 0 1px #fbbf24; }

  /* Drag & Drop */
  tr.dragging { opacity:.4; }
  tr.drag-over td { border-top:2px solid #1a3a5c !important; }
  td.drag-handle { cursor:grab; color:#cbd5e1; font-size:14px; user-select:none }
  td.drag-handle:active { cursor:grabbing }
  #refreshInfo{font-size:10px;color:#aaa;margin-left:4px}
</style>
</head>
<body>

<!-- Spinner -->
<div id="spinnerOverlay"><div class="spinner"></div></div>

<!-- Toast container -->
<div id="toastContainer"></div>

<div class="header">
  <h1>📦 Clearance Tracker</h1>
  <span id="headerInfo">Loading...</span>
</div>

<div class="wrap">
  <div class="summary" id="summary"></div>

  <div class="mode-bar">
    <span class="mode-badge mode-view" id="modeBadge">View Mode</span>
    <span class="hint" id="modeHint">اضغط Edit Mode لتفعيل التعديل</span>
    <span id="savingDot" title="جاري الحفظ..."></span>
    <span style="margin-left:auto;font-size:11px;color:#aaa" id="countInfo"></span>
    <span id="refreshInfo"></span>
  </div>

  <div class="toolbar">
    <select id="fBank"><option value="">كل البنوك</option><option>QNB</option><option>NBE</option><option>ATJ</option></select>
    <select id="fStatus"><option value="">كل الحالات</option><option value="W">W</option><option value="B">B</option><option value="O">O</option><option value="F">F</option><option value="H">H</option><option value="C">C</option><option value="N">N</option><option value="W/O">W/O</option><option value="S-O">S-O</option><option value="S-B">S-B</option><option value="S-W">S-W</option></select>
    <select id="fSupplier"><option value="">كل الموردين</option><option>Zaurak</option><option>Navigator</option></select>
    <select id="fClearer"><option value="">كل الـ Clearers</option><option>Relan</option><option>Mahaba</option><option>El Badry</option></select>
    <input id="fSearch" type="text" placeholder="بحث BL / عميل / بضاعة / Ref..."/>
    <button class="btn btn-edit" id="btnToggleEdit" onclick="toggleEdit()">✏️ Edit Mode</button>
    <button class="btn btn-add" id="btnAdd" onclick="addRow()">➕</button>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
    <button class="btn" onclick="loadData(true)" title="تحديث يدوي">🔄 Refresh</button>
  </div>

  <div class="tbl-wrap">
    <table>
      <colgroup>
        <col style="width:18px"><col style="width:115px"><col style="width:60px"><col style="width:130px"><col style="width:100px"><col style="width:55px">
        <col style="width:50px"><col style="width:88px"><col style="width:24px"><col style="width:55px">
        <col style="width:50px"><col style="width:18px"><col style="width:18px"><col><col style="width:75px"><col style="width:55px"><col style="width:68px">
      </colgroup>
      <thead><tr>
        <th style="width:22px">⠿</th><th>BL No. / Ref</th><th>SL</th><th>بضاعة</th><th>عميل / مورد</th><th>بنك</th>
        <th>حاويات</th><th>مبلغ $</th><th>ETA</th><th>تخزين</th>
        <th>وصول من البنك</th><th>أيام</th><th>حالة</th><th style="text-align:center">Clearer</th><th style="text-align:center">ملاحظات</th><th>🎨</th><th>⚙️</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Shared Color Picker Menu -->
<div id="sharedCpMenu" style="display:none;position:fixed;z-index:99999;background:#fff;border-radius:12px;padding:8px;min-width:185px;box-shadow:0 16px 40px rgba(0,0,0,.2);border:1px solid #e5e7eb;"></div>

<!-- F Status Modal -->
<div id="fModal">
  <div class="box">
    <h3>🎉</h3>
    <p style="font-size:15px;font-weight:600;color:#166534;margin-bottom:6px">الشحنة خلصت!</h3>
    <p>هل تريد حذفها من السيستم نهائياً؟</p>
    <div class="btns">
      <button class="yes" onclick="fModalYes()">نعم، احذف</button>
      <button class="no" onclick="fModalNo()">لا، خليها</button>
    </div>
  </div>
</div>

<div class="footer">UPI Clearance Tracker — <span id="today"></span></div>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG — paste your deployed Apps Script URL here
// ════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbw6PEP9B0uYrpqx-ohCGMgUtkdmRWQfCaVuqcQA5x3YStyeRbld4DFO2quxuOfnJ4e8/exec';

const AUTO_REFRESH_INTERVAL = 60000; // 60 seconds

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let rows      = [];
let editMode  = false;
let editRowId = null;  // id الصف الـ edit فيه
let nextId    = Date.now();           // base for new IDs (ms timestamp)
let saveTimer = null;                 // debounce handle
let refreshCountdown = AUTO_REFRESH_INTERVAL / 1000;
let refreshInterval  = null;

document.getElementById('today').textContent = new Date().toLocaleDateString('en-GB');

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function showSpinner()  { document.getElementById('spinnerOverlay').classList.add('active') }
function hideSpinner()  { document.getElementById('spinnerOverlay').classList.remove('active') }
function showSaving()   { document.getElementById('savingDot').classList.add('active') }
function hideSaving()   { document.getElementById('savingDot').classList.remove('active') }

function toast(msg, type = 'info', duration = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => el.classList.add('show'));
  });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ════════════════════════════════════════════════════════════
//  API LAYER
//  القراءة : fetch عادي — GAS بيرجع JSON صح
//  الكتابة : form POST داخل iframe مخفي
//            بيتجاوز CORS redirect تماماً
// ════════════════════════════════════════════════════════════

async function apiGetAll() {
  const url = API_URL + '?action=read&t=' + Date.now();
  const res  = await fetch(url, { redirect: 'follow' });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch(e) { throw new Error('GAS parse error'); }
  if (data && data.error) throw new Error(data.error);
  return Array.isArray(data) ? data : [];
}

// Form POST داخل iframe — بيتجاوز CORS تماماً
function gasFormPost(params) {
  return new Promise((resolve) => {
    const iframeId = 'gas_iframe_' + Date.now();
    const formId   = 'gas_form_'   + Date.now();

    const iframe = document.createElement('iframe');
    iframe.id    = iframeId;
    iframe.name  = iframeId;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form   = document.createElement('form');
    form.id      = formId;
    form.method  = 'POST';
    form.action  = API_URL;
    form.target  = iframeId;
    form.style.display = 'none';

    // كل parameter يتحط كـ hidden input
    Object.entries(params).forEach(([k, v]) => {
      const input = document.createElement('input');
      input.type  = 'hidden';
      input.name  = k;
      input.value = String(v);
      form.appendChild(input);
    });

    document.body.appendChild(form);

    // بعد الـ load أو 4 ثواني → نعتبره نجح
    const cleanup = () => {
      setTimeout(() => {
        iframe.remove();
        form.remove();
      }, 500);
      resolve(true);
    };

    iframe.onload = cleanup;
    setTimeout(cleanup, 4000);

    form.submit();
  });
}

async function apiCreate(row) {
  await gasFormPost({ action: 'create', data: JSON.stringify(row) });
}

async function apiUpdate(row) {
  await gasFormPost({ action: 'update', data: JSON.stringify(row) });
}

async function apiDelete(id) {
  await gasFormPost({ action: 'delete', id: String(id) });
}

// ════════════════════════════════════════════════════════════
//  VALIDATION
// ════════════════════════════════════════════════════════════
function validateRow(r) {
  const errors = [];
  if (!r.bl  || !r.bl.trim())     errors.push('BL No. مطلوب');
  if (!r.goods || !r.goods.trim())errors.push('البضاعة مطلوبة');
  if (!r.client|| !r.client.trim())errors.push('العميل مطلوب');
  if (!r.bank)                    errors.push('البنك مطلوب');
  if (isNaN(parseFloat(r.amount)))errors.push('المبلغ يجب أن يكون رقمًا');
  return errors;
}

// ════════════════════════════════════════════════════════════
//  DUPLICATE ID GUARD
// ════════════════════════════════════════════════════════════
function uniqueId() {
  const existing = new Set(rows.map(r => Number(r.id)).filter(n => n < 100000));
  let id = 101;
  while (existing.has(id)) id++;
  return String(id);
}

// ════════════════════════════════════════════════════════════
//  LOAD DATA
// ════════════════════════════════════════════════════════════
async function loadData(manual = false) {
  if (manual) showSpinner();
  try {
    const data = await apiGetAll();
    if (Array.isArray(data)) {
      rows = data.map(r => ({
        ...r,
        amount : parseFloat(r.amount) || 0,
        days   : parseInt(r.days)     || 0,
        order  : (r.order !== '' && r.order !== null && r.order !== undefined && !isNaN(parseInt(r.order))) ? parseInt(r.order) : 9999,
      })).sort((a, b) => a.order - b.order);
      render();
      if (manual) toast('تم تحديث البيانات ✓', 'success');
    }
  } catch (err) {
    toast('خطأ في تحميل البيانات: ' + err.message, 'error', 5000);
    console.error('loadData error', err);
  } finally {
    if (manual) hideSpinner();
  }
}

// ════════════════════════════════════════════════════════════
//  AUTO REFRESH
// ════════════════════════════════════════════════════════════
function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshCountdown = AUTO_REFRESH_INTERVAL / 1000;

  refreshInterval = setInterval(async () => {
    refreshCountdown--;
    document.getElementById('refreshInfo').textContent = `🔁 ${refreshCountdown}s`;
    if (refreshCountdown <= 0) {
      refreshCountdown = AUTO_REFRESH_INTERVAL / 1000;
      await loadData(false);
    }
  }, 1000);
}

// ════════════════════════════════════════════════════════════
//  FIELD UPDATE  (debounced → auto-save)
// ════════════════════════════════════════════════════════════
function updateField(id, field, val) {
  const r = rows.find(x => String(x.id) === String(id));
  if (!r) return;

  // لو الحالة بقت F — اعرض modal
  if (field === 'status' && val === 'F') {
    window._fPendingId = id;
    window._fPendingRow = r;
    r[field] = val;
    updateSummary(getFiltered());
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => persistUpdate(r), 600);
    document.getElementById('fModal').classList.add('active');
    return;
  }

  if (field === 'amount') r[field] = parseFloat(val) || 0;
  else if (field === 'days') r[field] = parseInt(val) || 0;
  else if (['eta','storage','rcvd'].includes(field)) {
    r[field] = val ? String(val).slice(0,10) : '';
  }
  else r[field] = val;

  updateSummary(getFiltered());

  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => persistUpdate(r), 600);
}

async function persistUpdate(r) {
  showSaving();
  try {
    await apiUpdate(r);
    hideSaving();
  } catch (err) {
    hideSaving();
    toast('خطأ في الحفظ: ' + err.message, 'error', 5000);
    console.error('persistUpdate error', err);
  }
}

// Manual save button
async function manualSave(id) {
  const r = rows.find(x => String(x.id) === String(id));
  if (!r) return;
  clearTimeout(saveTimer); // cancel any pending debounce
  const btn = document.querySelector(`button.save[onclick*="${id}"]`);
  if (btn) { btn.textContent = "⏳"; btn.disabled = true; }
  showSaving();
  try {
    await apiUpdate(r);
    hideSaving();
    toast("تم الحفظ ✓", "success");
    editRowId = null;
    render();
  } catch (err) {
    hideSaving();
    toast("خطأ في الحفظ: " + err.message, "error", 5000);
  } finally {
    if (btn) { btn.textContent = "💾"; btn.disabled = false; }
  }
}

// ════════════════════════════════════════════════════════════
//  DELETE
// ════════════════════════════════════════════════════════════
async function deleteRow(id) {
  if (!confirm('تأكيد حذف الشحنة؟ لا يمكن التراجع.')) return;
  showSpinner();
  try {
    await apiDelete(id);
    rows = rows.filter(r => String(r.id) !== String(id));
    render();
    toast('تم حذف الشحنة ✓', 'success');
  } catch (err) {
    toast('خطأ في الحذف: ' + err.message, 'error', 5000);
    console.error('deleteRow error', err);
  } finally {
    hideSpinner();
  }
}

async function addRow() {
  const newRow = {
    id      : uniqueId(),
    bl      : 'BL-NEW',
    sl      : '',
    ref     : '',
    goods   : '',
    supplier: 'Navigator',
    client  : '',
    bank    : 'NBE',
    amount  : 0,
    cntr    : '1x40',
    eta     : '',
    storage : '',
    rcvd    : '',
    days    : 0,
    status  : 'N',
    clearer : '',
    comment : '',
    rowColor: ''
  };

  showSpinner();
  try {
    await apiCreate(newRow);
    rows.push(newRow);
    render();
    toast('تمت إضافة شحنة جديدة ✓', 'success');
    document.getElementById('tbody').lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch (err) {
    toast('خطأ في الإضافة: ' + err.message, 'error', 5000);
    console.error('addRow error', err);
  } finally {
    hideSpinner();
  }
}

function openEditRow(id) {

  } else {
    editRowId = String(id);

function toggleEdit() {

    badge.textContent = 'Edit Mode';

    document.getElementById('modeHint').textContent = 'عدّل أي خلية — يتحفظ تلقائيًا في Google Sheets';

// ════════════════════════════════════════════════════════════
//  FILTER
// ════════════════════════════════════════════════════════════
function getFiltered() {
  const bank     = document.getElementById('fBank').value;
  const status   = document.getElementById('fStatus').value;
  const supplier = document.getElementById('fSupplier').value;
  const clearer  = document.getElementById('fClearer').value;
  const q        = document.getElementById('fSearch').value.toLowerCase();
  return rows.filter(r => {
    if (bank     && r.bank     !== bank)     return false;
    if (status   && r.status   !== status)   return false;
    if (supplier && r.supplier !== supplier) return false;
    if (clearer  && r.clearer  !== clearer)  return false;
    if (q && !(
      r.bl.toLowerCase().includes(q)    ||
      r.goods.toLowerCase().includes(q) ||
      r.client.toLowerCase().includes(q)||
      r.ref.toLowerCase().includes(q)
    )) return false;
    return true;
  });
}

function cpToggle(id) {
  if (_cpOpenId === id) { cpClose(); return; }
  _cpOpenId = id;

  const btn  = document.querySelector('[data-cptoggle="' + id + '"]');
  const menu = document.getElementById('sharedCpMenu');

  const cur = String((rows.find(r => String(r.id) === String(id)) || {}).rowColor || '');

function fmtAmt(v) { return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }) }
function bankCls(b) { return b === 'QNB' ? 'bank-QNB' : b === 'NBE' ? 'bank-NBE' : b === 'ATJ' ? 'bank-ATJ' : 'bank-QNB' }
function statusCls(s) { const m={'W':'s-W','B':'s-B','O':'s-O','S-B':'s-SB','S-O':'s-SO','S-W':'s-SW','F':'s-F','H':'s-H','C':'s-C','N':'s-N','W/O':'s-WO'}; return m[s]||'s-N'; }
function daysCls(d) { d = Number(d); if (d <= 0) return 'days-neg'; if (d > 10) return 'days-danger'; if (d > 4) return 'days-warn'; return 'days-ok' }

// حساب الأيام من اليوم لحد ETA
function calcDays(eta) {
  if (!eta) return null;
  const s   = String(eta);
  const raw = s.includes('T') ? s.split('T')[0] : s.slice(0,10);
  const parts = raw.split('-');
  if (parts.length !== 3) return null;
  // نبني التاريخ بـ local time مباشرة بدون UTC
  const etaDate = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
  if (isNaN(etaDate)) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  etaDate.setHours(0,0,0,0);
  return Math.round((etaDate - today) / (1000 * 60 * 60 * 24));
}
function statusOpts(cur) { return ['W','B','O','F','H','C','N','W/O','S-O','S-B','S-W'].map(s => `<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('') }
function bankOpts(cur)   { return ['QNB','NBE','ATJ'].map(b => `<option${b===cur?' selected':''}>${b}</option>`).join('') }
function suppOpts(cur)   { return ['Zaurak','Navigator'].map(s => `<option${s===cur?' selected':''}>${s}</option>`).join('') }
function clearerOpts(cur) { return ['','Relan','Mahaba','El Badry'].map(c => `<option value="${c}"${c===cur?' selected':''}>${c||'—'}</option>`).join('') }

// Parse any date format → YYYY-MM-DD for <input type="date">
// تحويل dd/mm/yyyy → YYYY-MM-DD نص بحت بدون أي Date object
function parseLocalDate(v) {
  if (!v) return '';
  v = v.trim();
  // لو دخل YYYY-MM-DD يرجعه مباشرة
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  // لو دخل dd/mm/yyyy
  const parts = v.split('/');
  if (parts.length === 3) {
    const dd = parts[0].padStart(2,'0');
    const mm = parts[1].padStart(2,'0');
    const yyyy = parts[2].length === 2 ? '20'+parts[2] : parts[2];
    return yyyy+'-'+mm+'-'+dd;
  }
  return v;
}

function fmtDateInput(v) {
  if (!v) return '';
  const s = String(v).trim();
  // لو timestamp خد الجزء الأول
  const raw = s.includes('T') ? s.split('T')[0] : s.slice(0,10);
  // لو dd/mm/yyyy حوّله
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) {
    const p = raw.split('/');
    return p[2]+'-'+p[1]+'-'+p[0];
  }
  return raw;
}
// Display date as dd/mm/yyyy — strips time always
function fmtDateDisplay(v) {
  if (!v) return '—';
  const s = String(v);
  // خد YYYY-MM-DD بس بدون أي تحويل
  const dateOnly = s.includes('T') ? s.split('T')[0] : s.slice(0,10);
  const parts = dateOnly.split('-');
  if (parts.length === 3 && parts[0].length === 4) {
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  return v || '—';
}

// XSS escape
function esc(v) {
  return String(v || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

//  SUMMARY CARDS (unchanged logic)

function updateSummary(filtered) {
  const total  = filtered.reduce((s,r) => s + Number(r.amount), 0);
  const byBank = { QNB:0, NBE:0, ATJ:0 };
  filtered.forEach(r => { if (byBank[r.bank] !== undefined) byBank[r.bank] += Number(r.amount) });
  const inPort = filtered.filter(r => r.status === 'W').length;
  document.getElementById('summary').innerHTML = `
    <div class="card"><div class="card-label">إجمالي المبالغ</div><div class="card-val">${fmtAmt(total)}</div><div class="card-sub">${filtered.length} شحنة</div></div>
    <div class="card"><div class="card-label">QNB</div><div class="card-val">${fmtAmt(byBank.QNB)}</div><div class="card-sub">${filtered.filter(r=>r.bank==='QNB').length} شحنة</div></div>
    <div class="card"><div class="card-label">NBE</div><div class="card-val">${fmtAmt(byBank.NBE)}</div><div class="card-sub">${filtered.filter(r=>r.bank==='NBE').length} شحنة</div></div>
    <div class="card"><div class="card-label">ATJ</div><div class="card-val">${fmtAmt(byBank.ATJ)}</div><div class="card-sub">${filtered.filter(r=>r.bank==='ATJ').length} شحنة</div></div>
    <div class="card"><div class="card-label">في الميناء</div><div class="card-val" style="color:#dc2626">${inPort}</div><div class="card-sub">شحنة نشطة</div></div>`;
  document.getElementById('headerInfo').textContent = `${filtered.length} شحنة — إجمالي ${fmtAmt(total)}`;
  document.getElementById('countInfo').textContent  = `عرض ${filtered.length} من ${rows.length}`;
}

// ════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════
function render() {
  const filtered = getFiltered();
  updateSummary(filtered);
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="13" class="empty">لا توجد نتائج</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(r => {
    const isEditing = editRowId === String(r.id);
    const cls = getRowClass(r.rowColor) + (isEditing ? ' row-active-edit' : '');
    return `<tr data-id="${r.id}" class="${cls}">${isEditing ? editRow(r) : viewRow(r)}</tr>`;
  }).join('');
  initDrag();
}

async function updateRowColor(id, val) {
  const r = rows.find(x => String(x.id) === String(id));
  if (!r) return;
  r.rowColor = val;
  render();
  showSaving();
  try { await apiUpdate(r); hideSaving(); toast('تم حفظ اللون ✓', 'success', 1500); }
  catch(err) { hideSaving(); toast('خطأ في حفظ اللون', 'error', 3000); }
}

// ════════════════════════════════════════════════════════════
//  DRAG & DROP SORT
// ════════════════════════════════════════════════════════════
let dragSrcId = null;

function initDrag() {
  const tbody = document.getElementById('tbody');
  const trs   = tbody.querySelectorAll('tr');

  trs.forEach(tr => {
    const handle = tr.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('mousedown', () => { tr.draggable = true; });
    handle.addEventListener('mouseup',   () => { tr.draggable = false; });

    tr.addEventListener('dragstart', e => {
      dragSrcId = tr.dataset.id;
      tr.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    tr.addEventListener('dragend', () => {
      tr.draggable = false;
      tr.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    });

    tr.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      tr.classList.add('drag-over');
    });

    tr.addEventListener('drop', async e => {
      e.preventDefault();
      const targetId = tr.dataset.id;
      if (!dragSrcId || dragSrcId === targetId) return;

      const srcIdx = rows.findIndex(r => String(r.id) === String(dragSrcId));
      const tgtIdx = rows.findIndex(r => String(r.id) === String(targetId));
      if (srcIdx === -1 || tgtIdx === -1) return;

      const [moved] = rows.splice(srcIdx, 1);
      rows.splice(tgtIdx, 0, moved);
      // حفظ الـ order
      rows.forEach((r, i) => { r.order = i; });
      render();
      // حفظ في الشيت
      showSaving();
      try {
        for (const r of rows) { await apiUpdate(r); }
        hideSaving();
        toast('تم حفظ الترتيب ✓', 'success');
      } catch(err) {
        hideSaving();
        toast('خطأ في حفظ الترتيب', 'error', 3000);
      }
    });
  });
}

// ════════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════════
document.addEventListener('keydown', async (e) => {
  const inInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  const alt  = e.altKey;
  // نستخدم e.code عشان يشتغل بغض النظر عن اللغة
  const code = e.code; // 'KeyS', 'KeyN', etc.

  if (alt && code === 'KeyS') {
    e.preventDefault();
    showSaving();
    try {
      for (const r of rows) { await apiUpdate(r); }
      hideSaving();
      toast('تم حفظ كل التعديلات ✓', 'success');
    } catch(err) {
      hideSaving();
      toast('خطأ في الحفظ: ' + err.message, 'error', 4000);
    }
    return;
  }

  if (e.code === 'Escape' && editMode) { toggleEdit(); return; }
  if (inInput) return;

  if (alt && code === 'KeyN') { e.preventDefault(); addRow(); return; }
  if (alt && code === 'KeyE') { e.preventDefault(); toggleEdit(); return; }
  if (alt && code === 'KeyR') { e.preventDefault(); loadData(true); return; }
  if (alt && code === 'KeyP') { e.preventDefault(); window.print(); return; }
  if (alt && code === 'KeyF') { e.preventDefault(); document.getElementById('fSearch').focus(); return; }
});

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
(async () => {
  showSpinner();
  await loadData(false);
  hideSpinner();
  startAutoRefresh();
})();
</script>
